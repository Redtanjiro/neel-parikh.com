<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Neel Parikh</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141210;--paper:#f7f6f1;--line:#e4e2da;--muted:#6b6a63;--muted-dark:#9a988f;
    --display:'Bricolage Grotesque',sans-serif;--body:'DM Sans',sans-serif;--ui:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .wrap{max-width:1160px;margin:0 auto;padding:0 32px}

  nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px 32px;mix-blend-mode:difference}
  nav a{color:#fff}
  nav .wordmark{font-family:var(--display);font-weight:700;font-size:17px}
  nav .navlinks{display:flex;gap:28px}
  nav .navlinks a{font-family:var(--ui);font-size:14px;opacity:.85}
  nav .navlinks a.active{opacity:1;font-weight:600}

  /* ---- INTRO ---- */
  .work-intro{padding:150px 0 40px;text-align:center}
  .work-intro .eyebrow{font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .work-intro h1{font-family:var(--display);font-weight:800;font-size:clamp(44px,7vw,88px);line-height:.98;letter-spacing:-.03em}
  .work-intro p{font-size:18px;color:var(--muted);margin-top:20px;max-width:44ch;margin-inline:auto}

  /* view toggle */
  .toggle{display:inline-flex;gap:4px;background:#eceae2;border-radius:100px;padding:5px;margin-top:32px}
  .toggle button{font-family:var(--ui);font-size:13px;font-weight:500;padding:9px 20px;border-radius:100px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
  .toggle button.active{background:var(--ink);color:#fff}

  /* ---- STACK VIEW (Maxima-style scroll cards) ---- */
  .stack{position:relative;margin-top:40px}
  .stack.hidden{display:none}
  .card-stage{height:100vh;position:sticky;top:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stack-card{
    position:absolute;width:min(880px,86vw);
    background:var(--ink);border-radius:22px;overflow:hidden;
    box-shadow:0 40px 80px -30px rgba(0,0,0,.5);
    will-change:transform,opacity;
    transform-origin:center top;
  }
  .stack-card img{width:100%;aspect-ratio:16/10;object-fit:cover}
  .stack-card .sc-body{padding:26px 30px;display:flex;justify-content:space-between;align-items:center;color:#fff}
  .stack-card .sc-title{font-family:var(--display);font-weight:700;font-size:26px}
  .stack-card .sc-meta{font-family:var(--ui);font-size:13px;color:#b8b6ae}
  .stack-scroll{height:100vh}  /* one viewport of scroll per card */

  /* ---- SPREAD VIEW (grid) ---- */
  .spread{display:none;padding:20px 0 80px}
  .spread.active{display:block}
  .spread-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px;margin-top:20px}
  .spread-card{background:var(--ink);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s}
  .spread-card:hover{transform:translateY(-8px);box-shadow:0 30px 60px -25px rgba(0,0,0,.4)}
  .spread-card img{width:100%;aspect-ratio:16/10;object-fit:cover}
  .spread-card .sp-body{padding:24px;color:#fff;display:flex;justify-content:space-between;align-items:baseline}
  .spread-card .sp-title{font-family:var(--display);font-weight:700;font-size:24px}
  .spread-card .sp-meta{font-family:var(--ui);font-size:13px;color:#b8b6ae}
  @media(max-width:720px){.spread-grid{grid-template-columns:1fr}}

  /* ---- JACK & AI EDITORIAL LIST (below) ---- */
  .editorial{padding:100px 0}
  .editorial .lead{font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px}
  .editorial h2{font-family:var(--display);font-weight:700;font-size:clamp(30px,4vw,46px);text-align:center;letter-spacing:-.02em;margin-bottom:60px}
  .ed-row{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:56px 0;border-top:1px solid var(--line)}
  .ed-row:last-child{border-bottom:1px solid var(--line)}
  .ed-row.flip .ed-media{order:2}
  .ed-media{overflow:hidden;border-radius:18px}
  .ed-media img{width:100%;aspect-ratio:4/3;object-fit:cover;transition:transform .7s cubic-bezier(.2,.8,.2,1)}
  .ed-row:hover .ed-media img{transform:scale(1.05)}
  .ed-num{font-family:var(--ui);font-size:13px;letter-spacing:.1em;color:var(--muted-dark);margin-bottom:14px}
  .ed-title{font-family:var(--display);font-weight:800;font-size:clamp(34px,4.5vw,56px);line-height:.98;letter-spacing:-.03em;margin-bottom:14px}
  .ed-desc{font-size:16px;color:#4a4942;line-height:1.6;max-width:42ch;margin-bottom:22px}
  .ed-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .ed-tags span{font-family:var(--ui);font-size:12px;padding:6px 14px;border-radius:100px;border:1px solid var(--line);color:var(--muted)}
  .ed-link{font-family:var(--ui);font-size:15px;font-weight:500;color:var(--ink);display:inline-flex;align-items:center;gap:8px}
  .ed-link::after{content:"→";transition:transform .2s}
  .ed-row:hover .ed-link::after{transform:translateX(5px)}
  @media(max-width:760px){.ed-row,.ed-row.flip .ed-media{grid-template-columns:1fr;order:0;gap:24px}.ed-media{order:-1!important}}

  .reveal{opacity:0;transform:translateY(30px);transition:opacity .8s ease,transform .8s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}.stack-card{transition:none}html{scroll-behavior:auto}}
  @media(max-width:820px){nav .navlinks{display:none}}
</style>
</head>
<body>

<nav>
  <a class="wordmark" href="/">Neel Parikh</a>
  <div class="navlinks">
    <a href="/work" class="active">Work</a>
    <a href="/about">About</a>
    <a href="mailto:neelparikh7@gmail.com">Contact</a>
  </div>
</nav>

<div class="work-intro">
  <div class="wrap">
    <p class="eyebrow">Selected Work</p>
    <h1>Things I've made.</h1>
    <p>Product, brand, and web — a few projects worth walking through.</p>
    <div class="toggle" id="toggle">
      <button class="active" data-view="stack">Stacked</button>
      <button data-view="spread">See all</button>
    </div>
  </div>
</div>

<!-- STACK VIEW -->
<div class="stack" id="stackView">
  <div class="card-stage">
    <div class="stack-card" data-i="0" href="/work/futee">
      <img src="assets/thumb-futee.webp" alt="Futee">
      <div class="sc-body"><span class="sc-title">Futee</span><span class="sc-meta">Product · UX/UI · Visual</span></div>
    </div>
    <div class="stack-card" data-i="1" href="/work/emf-ace">
      <img src="assets/thumb-emf.webp" alt="EMF ACE">
      <div class="sc-body"><span class="sc-title">EMF ACE</span><span class="sc-meta">Brand · Campaign · Events</span></div>
    </div>
    <div class="stack-card" data-i="2" href="/work/cseds">
      <img src="assets/thumb-cseds.webp" alt="CSEDS">
      <div class="sc-body"><span class="sc-title">CSEDS</span><span class="sc-meta">Web Design · Framer</span></div>
    </div>
  </div>
  <div class="stack-scroll"></div>
  <div class="stack-scroll"></div>
  <div class="stack-scroll"></div>
</div>

<!-- SPREAD VIEW -->
<div class="spread" id="spreadView">
  <div class="wrap">
    <div class="spread-grid">
      <a class="spread-card reveal" href="/work/futee"><img src="assets/thumb-futee.webp" alt="Futee"><div class="sp-body"><span class="sp-title">Futee</span><span class="sp-meta">Product</span></div></a>
      <a class="spread-card reveal" href="/work/emf-ace"><img src="assets/thumb-emf.webp" alt="EMF ACE"><div class="sp-body"><span class="sp-title">EMF ACE</span><span class="sp-meta">Brand</span></div></a>
      <a class="spread-card reveal" href="/work/cseds"><img src="assets/thumb-cseds.webp" alt="CSEDS"><div class="sp-body"><span class="sp-title">CSEDS</span><span class="sp-meta">Web</span></div></a>
    </div>
  </div>
</div>

<!-- (editorial project list lives on the homepage, below the hero) -->

<script>
  // ---- View toggle ----
  const toggle=document.getElementById('toggle');
  const stackView=document.getElementById('stackView');
  const spreadView=document.getElementById('spreadView');
  toggle.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      toggle.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===btn));
      const v=btn.dataset.view;
      if(v==='spread'){stackView.classList.add('hidden');spreadView.classList.add('active');}
      else{stackView.classList.remove('hidden');spreadView.classList.remove('active');}
    });
  });

  // ---- Stack scroll animation: active card center, finished cards pile to the side ----
  const cards=[...document.querySelectorAll('.stack-card')];
  const stack=document.getElementById('stackView');
  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const easeOut=t=>1-Math.pow(1-t,3);
  let ticking=false;
  function updateStack(){
    if(reduce){cards.forEach(c=>{c.style.transform='';c.style.opacity=1});return;}
    const rect=stack.getBoundingClientRect();
    const vh=window.innerHeight;
    const total=stack.offsetHeight-vh;
    let p=Math.max(0,Math.min(1,(0-rect.top)/total));
    const n=cards.length;
    const seg=1/n;
    // where the "pile" sits (left of center) and how much each piled card offsets
    const PILE_X=-360, PILE_STEP=-18, PILE_ROT=-6;
    cards.forEach((card,i)=>{
      const local=(p-i*seg)/seg; // progress for this card: <0 waiting, 0..1 active, >1 done
      if(local<0){
        // waiting below center, slightly down & scaled, peeking
        const w=Math.min(1,-local);
        card.style.transform=`translate(0,${36*w}px) scale(${1-0.05*w}) rotate(0deg)`;
        card.style.opacity=1; card.style.zIndex=100+(n-i);
      }else if(local<=1){
        // active: sits center, on top
        card.style.transform=`translate(0,0) scale(1) rotate(0deg)`;
        card.style.opacity=1; card.style.zIndex=200;
      }else{
        // done: slide off to the left and settle into the pile
        const done=Math.min(1,local-1);
        const restX=PILE_X + i*PILE_STEP;      // each finished card stacks a bit further
        const restRot=PILE_ROT + i*1.5;
        const x=restX*easeOut(done);
        const rot=restRot*easeOut(done);
        const sc=1-0.12*easeOut(done);
        card.style.transform=`translate(${x}px,0) scale(${sc}) rotate(${rot}deg)`;
        card.style.opacity=1; card.style.zIndex=50+i; // piled, behind active
      }
    });
    ticking=false;
  }
  window.addEventListener('scroll',()=>{if(!ticking){requestAnimationFrame(updateStack);ticking=true;}},{passive:true});
  window.addEventListener('resize',updateStack,{passive:true});
  updateStack();
  // make stack cards clickable
  cards.forEach(c=>c.addEventListener('click',()=>{if(c.getAttribute('href'))location.href=c.getAttribute('href')}));
  cards.forEach(c=>c.style.cursor='pointer');

  // ---- Reveal on scroll ----
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.15,rootMargin:"0px 0px -50px 0px"});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
