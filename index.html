<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neel Parikh — Interaction & Immersive Designer</title>
<meta name="description" content="Neel Parikh is an interaction & immersive designer based in Sydney.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --display: 'Bricolage Grotesque', sans-serif;
    --body: 'DM Sans', sans-serif;
    --ui: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;

    --amber: #e8a13a;
    --ink: #141210;
    --paper: #f4f1ea;
    --line: rgba(20, 18, 16, 0.12);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 100px; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
  }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
  }

  img { max-width: 100%; display: block; }
  a { color: inherit; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  :focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 3px;
  }

  /* ============ NAV ============ */
  .site-nav {
    position: fixed;
    top: 20px; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    pointer-events: none;
    font-family: var(--ui);
    transition: top .45s cubic-bezier(.16,1,.3,1);
  }
  .site-nav.shrunk { top: 12px; }

  .nav-pill {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 28px;
    max-width: 760px;
    width: calc(100% - 40px);
    padding: 14px 26px;
    border-radius: 999px;
    background: rgba(20, 18, 16, 0.38);
    border: 1px solid rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: #fff;
    transition: max-width .45s cubic-bezier(.16,1,.3,1),
                padding .45s cubic-bezier(.16,1,.3,1),
                gap .45s cubic-bezier(.16,1,.3,1),
                background-color .45s ease;
  }
  .shrunk .nav-pill {
    max-width: 440px;
    padding: 8px 20px;
    gap: 18px;
    background: rgba(20, 18, 16, 0.5);
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: none;
    text-decoration: none;
    color: #fff;
  }

  .nav-brand-expanded {
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
    max-width: 220px;
    opacity: 1;
    transition: max-width .45s cubic-bezier(.16,1,.3,1), opacity .3s ease;
  }
  .shrunk .nav-brand-expanded { max-width: 0; opacity: 0; }

  .nav-sprite {
    height: 30px;
    width: auto;
    flex: none;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    transform-origin: bottom center;
    animation: sprite-bob 3.2s ease-in-out infinite;
  }
  .shrunk .nav-sprite { animation: none; }
  @keyframes sprite-bob {
    0%, 100% { transform: translateY(0) rotate(-1.5deg); }
    50% { transform: translateY(-2px) rotate(1.5deg); }
  }

  .wordmark-full {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .wordmark-compact {
    display: block;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    transition: max-width .45s cubic-bezier(.16,1,.3,1), opacity .3s ease;
  }
  .shrunk .wordmark-compact {
    max-width: 40px;
    opacity: 1;
    transition: max-width .45s cubic-bezier(.16,1,.3,1) .1s, opacity .3s ease .15s;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 22px;
    list-style: none;
    margin: 0 0 0 auto;
    padding: 0;
  }

  .nav-link {
    position: relative;
    display: inline-block;
    text-decoration: none;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding-bottom: 6px;
    transition: color .25s ease, font-size .3s ease;
  }
  .shrunk .nav-link { font-size: 12px; }

  .nav-link:hover,
  .nav-link:focus-visible {
    color: var(--amber) !important;
  }

  .nav-underline {
    position: absolute;
    left: -4%;
    bottom: -3px;
    width: 108%;
    height: 14px;
    overflow: visible;
    pointer-events: none;
  }
  .nav-underline path {
    stroke: var(--amber);
    fill: none;
    stroke-width: 2.4;
    vector-effect: non-scaling-stroke;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    opacity: 0;
    transition: stroke-dashoffset .5s ease, opacity .12s ease;
  }
  .nav-link:hover .nav-underline path,
  .nav-link:focus-visible .nav-underline path {
    stroke-dashoffset: 0;
    opacity: 1;
  }
  .nav-link--work .nav-underline { transform: rotate(-0.6deg) scaleY(1); }
  .nav-link--about .nav-underline { transform: rotate(0.9deg) scaleY(1.1); }
  .nav-link--contact .nav-underline { transform: rotate(-1.2deg) scaleY(0.9); }

  .nav-clock {
    flex: none;
    overflow: hidden;
    max-width: 160px;
    opacity: 1;
    margin-left: 22px;
    transition: max-width .45s cubic-bezier(.16,1,.3,1), opacity .3s ease, margin-left .45s ease;
  }
  .shrunk .nav-clock { max-width: 0; opacity: 0; margin-left: 0; }

  .nav-clock-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.14);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .nav-clock-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex: none;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  @media (prefers-reduced-motion: reduce) {
    .site-nav,
    .nav-pill,
    .nav-brand-expanded,
    .wordmark-compact,
    .nav-link,
    .nav-clock,
    .nav-underline path { transition: none; }
    .nav-sprite,
    .nav-clock-dot { animation: none; }
  }

  /* ============ HERO ============ */
  .hero {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background: var(--ink);
    padding-top: 110px;
  }

  .hero-scenes { position: absolute; inset: 0; }
  .hero-scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  .hero-scene.is-active { opacity: 1; }
  @media (prefers-reduced-motion: reduce) {
    .hero-scene { transition: none; }
  }

  .hero-dim {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    transition: opacity .5s ease;
    pointer-events: none;
    z-index: 1;
  }
  .hero.is-spotlighting .hero-dim { opacity: 0.45; }

  .hero-copy {
    position: absolute;
    left: clamp(20px, 5vw, 56px);
    bottom: clamp(28px, 5vw, 56px);
    z-index: 2;
    max-width: 460px;
    color: #fff;
  }
  .hero-copy h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(22px, 3vw, 30px);
    line-height: 1.15;
    margin: 0 0 10px;
    text-shadow: 0 2px 18px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.6);
  }
  .hero-copy p {
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.5;
    margin: 0;
    opacity: 0.92;
    text-shadow: 0 2px 14px rgba(0,0,0,.5);
  }

  .hero-disciplines {
    position: absolute;
    right: clamp(20px, 5vw, 56px);
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    text-align: right;
    max-width: 90vw;
  }

  .disciplines-eyebrow {
    display: block;
    font-family: var(--ui);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    color: #fff;
    opacity: 0.7;
    margin-bottom: 14px;
    text-shadow: 0 1px 8px rgba(0,0,0,.5);
  }

  .disciplines-list {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .discipline-word {
    position: relative;
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(34px, 5vw, 72px);
    letter-spacing: -0.02em;
    line-height: 1.08;
    color: rgba(255,255,255,0.55);
    padding: 4px 10px;
    transition: color .25s ease;
    text-shadow: 0 2px 16px rgba(0,0,0,.35);
  }
  .discipline-word:hover,
  .discipline-word:focus-visible {
    color: var(--amber);
    text-shadow: none;
  }

  .word-ring {
    position: absolute;
    inset: -22% -6%;
    width: 112%;
    height: 144%;
    overflow: visible;
    pointer-events: none;
  }
  .word-ring path {
    stroke: var(--amber);
    fill: none;
    stroke-width: 2.4;
    vector-effect: non-scaling-stroke;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    opacity: 0;
    transition: stroke-dashoffset .65s ease, opacity .1s ease;
    transform-origin: center;
  }
  .discipline-word:hover .word-ring path,
  .discipline-word:focus-visible .word-ring path {
    stroke-dashoffset: 0;
    opacity: 1;
    animation: ring-wobble 3.6s ease-in-out .65s infinite;
  }
  @keyframes ring-wobble {
    0%, 100% { transform: rotate(-0.5deg) scale(1); }
    50% { transform: rotate(0.6deg) scale(1.012); }
  }
  @media (prefers-reduced-motion: reduce) {
    .word-ring path { transition: opacity .12s ease; animation: none !important; }
    .discipline-word:hover .word-ring path,
    .discipline-word:focus-visible .word-ring path { stroke-dashoffset: 0; }
  }

  .discipline-caption {
    margin: 14px 0 0;
    min-height: 20px;
    font-family: var(--body);
    font-size: 14px;
    color: #fff;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .3s ease, transform .3s ease;
    text-shadow: 0 1px 10px rgba(0,0,0,.5);
  }
  .discipline-caption.is-visible {
    opacity: 0.85;
    transform: translateY(0);
  }

  .scroll-cue {
    position: absolute;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);
    z-index: 2;
    color: #fff;
    opacity: 0.6;
    font-size: 18px;
    text-decoration: none;
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, 6px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .scroll-cue { animation: none; }
  }

  /* ============ CHOSEN WORK ============ */
  .chosen-work {
    background: var(--paper);
    padding: clamp(80px, 12vw, 140px) clamp(20px, 5vw, 56px) clamp(60px, 8vw, 100px);
  }
  .section-inner { max-width: 1040px; margin: 0 auto; }

  .eyebrow {
    display: block;
    font-family: var(--ui);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    color: var(--amber);
    margin-bottom: 12px;
  }
  .section-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(32px, 5vw, 52px);
    letter-spacing: -0.02em;
    margin: 0 0 40px;
  }

  .filter-chip {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: var(--ui);
    font-size: 13px;
    font-weight: 500;
    background: rgba(232, 161, 58, 0.14);
    color: #8a5a12;
    border: 1px solid rgba(232, 161, 58, 0.4);
    border-radius: 999px;
    padding: 7px 8px 7px 16px;
    margin-bottom: 28px;
  }
  .filter-chip.is-visible { display: inline-flex; }
  .filter-chip button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 13px;
  }
  .filter-chip button:hover { background: rgba(232, 161, 58, 0.25); }

  .accordion { border-top: 1px solid var(--line); }
  .accordion-row { border-bottom: 1px solid var(--line); }
  .accordion-row.is-hidden { display: none; }

  .accordion-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 26px 4px;
    text-align: left;
  }
  .row-num {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--amber);
    min-width: 34px;
  }
  .row-title {
    flex: 1;
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(24px, 3.4vw, 38px);
    letter-spacing: -0.01em;
  }
  .row-toggle {
    font-family: var(--ui);
    font-size: 22px;
    font-weight: 400;
    line-height: 1;
    transition: transform .3s ease;
    color: var(--ink);
  }
  .accordion-row.is-open .row-toggle { transform: rotate(45deg); }

  .accordion-panel {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    padding: 0 4px;
    max-height: 0;
    overflow: hidden;
    transition: max-height .45s ease, padding .45s ease;
  }
  .accordion-row.is-open .accordion-panel {
    max-height: 220px;
    padding: 0 4px 36px;
  }
  @media (prefers-reduced-motion: reduce) {
    .accordion-panel { transition: none; }
  }
  .panel-desc {
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.6;
    max-width: 460px;
    margin: 0 0 14px;
  }
  .panel-link {
    display: inline-block;
    font-family: var(--ui);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 2px;
  }
  .panel-giant {
    font-family: var(--mono);
    font-weight: 500;
    font-size: clamp(48px, 9vw, 130px);
    line-height: 0.8;
    white-space: nowrap;
  }

  .empty-state {
    display: none;
    padding: 40px 4px;
    font-family: var(--body);
    font-size: 16px;
    color: rgba(20,18,16,0.55);
  }
  .empty-state.is-visible { display: block; }

  .see-all {
    display: inline-block;
    margin-top: 40px;
    font-family: var(--ui);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
  }

  /* ============ ALL WORK ============ */
  .all-work {
    background: var(--ink);
    color: var(--paper);
    padding: clamp(70px, 10vw, 120px) clamp(20px, 5vw, 56px) clamp(90px, 12vw, 140px);
  }
  .all-work .eyebrow { color: var(--amber); }
  .all-work .section-title { color: var(--paper); }

  .work-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(16px, 2vw, 28px);
  }

  .work-card {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    aspect-ratio: 16 / 10;
    padding: 22px;
    text-decoration: none;
    border-radius: 4px;
    background: color-mix(in srgb, var(--card-accent) 12%, var(--ink));
    border: 1px solid color-mix(in srgb, var(--card-accent) 30%, transparent);
    transition: background-color .3s ease, border-color .3s ease;
  }
  .work-card:hover,
  .work-card:focus-visible {
    background: color-mix(in srgb, var(--card-accent) 22%, var(--ink));
    border-color: color-mix(in srgb, var(--card-accent) 60%, transparent);
  }
  .work-card-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(22px, 2.6vw, 32px);
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    color: var(--paper);
    transition: color .3s ease;
  }
  .work-card:hover .work-card-title,
  .work-card:focus-visible .work-card-title {
    color: var(--card-accent);
  }
  .work-card-disciplines {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .work-card-disciplines span {
    font-family: var(--ui);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    color: var(--card-accent);
    border: 1px solid color-mix(in srgb, var(--card-accent) 45%, transparent);
  }

  /* ============ MOBILE ============ */
  @media (max-width: 820px) {
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 110px 20px 40px;
      min-height: auto;
    }
    .hero-scene { object-fit: contain; }
    .hero-copy, .hero-disciplines {
      position: static;
      transform: none;
      right: auto; left: auto; bottom: auto; top: auto;
      max-width: 100%;
      z-index: 2;
    }
    .hero-copy { text-align: center; margin-bottom: 28px; }
    .hero-copy h1 { font-size: clamp(26px, 7.5vw, 34px); }
    .hero-disciplines { text-align: center; margin-bottom: 28px; }
    .disciplines-list { align-items: center; }
    .discipline-word { font-size: clamp(30px, 9vw, 46px); }
    .scroll-cue { display: none; }
    .work-grid { grid-template-columns: 1fr; }

    .site-nav,
    .site-nav.shrunk { top: 12px; }
    .nav-pill {
      width: calc(100% - 24px);
      padding: 10px 12px;
      gap: 14px;
    }
    .shrunk .nav-pill { max-width: 300px; }
    .wordmark-full { font-size: 15px; }
    .nav-sprite { height: 24px; }
    .nav-links { gap: 14px; }
    .nav-link { font-size: 11px; }
    .shrunk .nav-link { font-size: 11px; }
    .nav-clock { display: none; }
  }
</style>
</head>
<body>

<header class="site-nav" id="site-nav">
  <div class="nav-pill">
    <a href="#hero" class="nav-brand" aria-label="Neel Parikh — back to top">
      <span class="nav-brand-expanded" aria-hidden="true">
        <img class="nav-sprite" src="/assets/sprite/neel-mug.png" alt="" aria-hidden="true">
        <span class="wordmark-full">Neel Parikh</span>
      </span>
      <span class="wordmark-compact" aria-hidden="true">NP</span>
    </a>

    <ul class="nav-links">
      <li>
        <a href="#chosen-work" class="nav-link nav-link--work">
          Work
          <svg class="nav-underline" viewBox="0 0 100 20" preserveAspectRatio="none" aria-hidden="true">
            <path pathLength="1" d="M2 12C2 12 20 13 40 12.4C60 11.8 80 11 98 10.6" />
          </svg>
        </a>
      </li>
      <li>
        <a href="/about.html" class="nav-link nav-link--about">
          About
          <svg class="nav-underline" viewBox="0 0 100 20" preserveAspectRatio="none" aria-hidden="true">
            <path pathLength="1" d="M2 11C2 11 22 12.5 42 12C62 11.5 80 10.4 98 9.8" />
          </svg>
        </a>
      </li>
      <li>
        <a href="/contact.html" class="nav-link nav-link--contact">
          Contact
          <svg class="nav-underline" viewBox="0 0 100 20" preserveAspectRatio="none" aria-hidden="true">
            <path pathLength="1" d="M2 10.5C2 10.5 18 12.8 38 11.8C58 10.8 82 10.9 98 12.2" />
          </svg>
        </a>
      </li>
    </ul>

    <div class="nav-clock">
      <span class="nav-clock-inner">
        <span class="nav-clock-dot" aria-hidden="true"></span>
        <span id="nav-clock-label">MORNING</span>
        <span id="nav-clock-time">--:--</span>
      </span>
    </div>
  </div>
</header>

<section class="hero" id="hero">
  <div class="hero-scenes">
    <img class="hero-scene" data-scene="morning" alt=""
         src="/assets/hero/hero-morning.webp"
         srcset="/assets/hero/hero-morning-sm.webp 1280w, /assets/hero/hero-morning.webp 2560w"
         sizes="100vw">
    <img class="hero-scene" data-scene="midday" alt=""
         src="/assets/hero/hero-midday.webp"
         srcset="/assets/hero/hero-midday-sm.webp 1280w, /assets/hero/hero-midday.webp 2560w"
         sizes="100vw">
    <img class="hero-scene" data-scene="golden" alt=""
         src="/assets/hero/hero-golden.webp"
         srcset="/assets/hero/hero-golden-sm.webp 1280w, /assets/hero/hero-golden.webp 2560w"
         sizes="100vw">
    <img class="hero-scene" data-scene="night" alt=""
         src="/assets/hero/hero-night.webp"

<script src="/assets/projects.js"></script>
<script>
(function () {
  'use strict';

  /* ---------- nav pill shrink/expand on scroll ---------- */
  var nav = document.getElementById('site-nav');
  var lastY = window.scrollY;
  var ticking = false;
  var TOP_ZONE = 80;
  var THRESHOLD = 6;

  function updateNavShrink() {
    var y = window.scrollY;
    if (y < TOP_ZONE) {
      nav.classList.remove('shrunk');
      lastY = y;
    } else if (Math.abs(y - lastY) > THRESHOLD) {
      nav.classList.toggle('shrunk', y > lastY);
      lastY = y;
    }
    ticking = false;
  }

  window.addEventListener('scroll', function () {
    if (!ticking) {
      requestAnimationFrame(updateNavShrink);
      ticking = true;
    }
  }, { passive: true });

  /* ---------- hero time-of-day scene swap + nav clock ---------- */
  var SCENE_LABELS = { morning: 'MORNING', midday: 'MIDDAY', golden: 'GOLDEN HOUR', night: 'NIGHT' };
  var sceneEls = document.querySelectorAll('.hero-scene');
  var labelEl = document.getElementById('nav-clock-label');
  var timeEl = document.getElementById('nav-clock-time');

  function getScene(hour) {
    if (hour >= 5 && hour < 11) return 'morning';
    if (hour >= 11 && hour < 16) return 'midday';
    if (hour >= 16 && hour < 19) return 'golden';
    return 'night';
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  var currentScene = null;
  function updateHeroTime() {
    var now = new Date();
    var hour = now.getHours();
    var scene = getScene(hour);

    if (scene !== currentScene) {
      currentScene = scene;
      sceneEls.forEach(function (el) {
        el.classList.toggle('is-active', el.dataset.scene === scene);
      });
      labelEl.textContent = SCENE_LABELS[scene];
    }
    timeEl.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  }
  updateHeroTime();
  setInterval(updateHeroTime, 30000);

  /* ---------- discipline hover: dim + caption ---------- */
  var CAPTIONS = {
    'UI/UX': 'Flows, IA, and interfaces that get out of the way.',
    'Visual': 'Type, colour, and image doing the talking.',
    'Immersive': 'Interaction beyond the rectangle — TouchDesigner, p5.js, physical space.',
    'Brand': 'Identity systems people recognise at a glance.'
  };
  var hero = document.querySelector('.hero');
  var captionEl = document.getElementById('discipline-caption');
  var disciplineButtons = document.querySelectorAll('.discipline-word');

  disciplineButtons.forEach(function (btn) {
    var d = btn.dataset.discipline;
    function activate() {
      hero.classList.add('is-spotlighting');
      captionEl.textContent = CAPTIONS[d];
      captionEl.classList.add('is-visible');
    }
    function deactivate() {
      hero.classList.remove('is-spotlighting');
      captionEl.classList.remove('is-visible');
    }
    btn.addEventListener('mouseenter', activate);
    btn.addEventListener('mouseleave', deactivate);
    btn.addEventListener('focus', activate);
    btn.addEventListener('blur', deactivate);

    btn.addEventListener('click', function () {
      applyFilter(d);
      document.getElementById('chosen-work').scrollIntoView({ behavior: 'smooth' });
    });
  });

  /* ---------- Chosen Work accordion ---------- */
  var accordionEl = document.getElementById('accordion');
  var emptyEl = document.getElementById('chosen-empty');
  var featured = window.PROJECTS.filter(function (p) { return p.featured; })
    .sort(function (a, b) { return a.order - b.order; });

  featured.forEach(function (project) {
    var row = document.createElement('div');
    row.className = 'accordion-row';
    row.dataset.disciplines = project.disciplines.join(',');

    var num = pad2(project.order);

    row.innerHTML =
      '<button class="accordion-trigger" aria-expanded="false" type="button">' +
        '<span class="row-num">' + num + '</span>' +
        '<span class="row-title">' + project.title + '</span>' +
        '<span class="row-toggle" aria-hidden="true">+</span>' +
      '</button>' +
      '<div class="accordion-panel">' +
        '<div>' +
          '<p class="panel-desc">' + project.description + '</p>' +
          '<a class="panel-link" href="/work/' + project.slug + '.html" style="color:' + project.accent + '">View case study →</a>' +
        '</div>' +
        '<span class="panel-giant" style="color:' + project.accent + '">' + num + '</span>' +
      '</div>';

    var trigger = row.querySelector('.accordion-trigger');
    trigger.addEventListener('click', function () {
      var isOpen = row.classList.contains('is-open');
      accordionEl.querySelectorAll('.accordion-row.is-open').forEach(function (openRow) {
        openRow.classList.remove('is-open');
        openRow.querySelector('.accordion-trigger').setAttribute('aria-expanded', 'false');
      });
      if (!isOpen) {
        row.classList.add('is-open');
        trigger.setAttribute('aria-expanded', 'true');
      }
    });

    accordionEl.appendChild(row);
  });

  function pad2(n) { return n < 10 ? '00' + n : (n < 100 ? '0' + n : '' + n); }

  /* ---------- discipline filter chip ---------- */
  var filterChip = document.getElementById('filter-chip');
  var filterChipLabel = document.getElementById('filter-chip-label');
  var filterChipDismiss = document.getElementById('filter-chip-dismiss');
  var currentFilter = null;

  function applyFilter(discipline) {
    currentFilter = discipline;
    filterChipLabel.textContent = 'Showing: ' + discipline;
    filterChip.classList.add('is-visible');

    var visibleCount = 0;
    accordionEl.querySelectorAll('.accordion-row').forEach(function (row) {
      var matches = row.dataset.disciplines.split(',').indexOf(discipline) !== -1;
      row.classList.toggle('is-hidden', !matches);
      if (matches) visibleCount++;
      if (!matches && row.classList.contains('is-open')) {
        row.classList.remove('is-open');
        row.querySelector('.accordion-trigger').setAttribute('aria-expanded', 'false');
      }
    });
    emptyEl.classList.toggle('is-visible', visibleCount === 0);
  }

  function clearFilter() {
    currentFilter = null;
    filterChip.classList.remove('is-visible');
    accordionEl.querySelectorAll('.accordion-row').forEach(function (row) {
      row.classList.remove('is-hidden');
    });
    emptyEl.classList.remove('is-visible');
  }

  filterChipDismiss.addEventListener('click', clearFilter);

  /* ---------- All Work grid ---------- */
  var gridEl = document.getElementById('work-grid');
  var allSorted = window.PROJECTS.slice().sort(function (a, b) { return a.order - b.order; });

  allSorted.forEach(function (project) {
    var card = document.createElement('a');
    card.className = 'work-card';
    card.href = '/work/' + project.slug + '.html';
    card.style.setProperty('--card-accent', project.accent);

    var tags = project.disciplines.map(function (d) { return '<span>' + d + '</span>'; }).join('');

    card.innerHTML =
      '<h3 class="work-card-title">' + project.title + '</h3>' +
      '<div class="work-card-disciplines">' + tags + '</div>';

    gridEl.appendChild(card);
  });
})();
</script>
