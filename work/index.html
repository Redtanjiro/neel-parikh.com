<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Neel Parikh</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141210;--paper:#f7f6f1;--line:rgba(255,255,255,.14);
    --muted:rgba(255,255,255,.55);--muted-dark:rgba(255,255,255,.4);
    --display:'Bricolage Grotesque',sans-serif;--body:'DM Sans',sans-serif;--ui:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);background:var(--ink);color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .wrap{max-width:1160px;margin:0 auto;padding:0 32px}
  nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px 32px;mix-blend-mode:difference}
  nav a{color:#fff}
  nav .wordmark{font-family:var(--display);font-weight:700;font-size:17px}
  nav .navlinks{display:flex;gap:28px}
  nav .navlinks a{font-family:var(--ui);font-size:14px;opacity:.85}
  nav .navlinks a.active{opacity:1;font-weight:600}
  .work-intro{padding:160px 0 30px}
  .work-intro .eyebrow{font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .work-intro h1{font-family:var(--display);font-weight:800;font-size:clamp(48px,8vw,104px);line-height:.96;letter-spacing:-.03em}
  .work-intro p{font-size:18px;color:var(--muted);margin-top:20px;max-width:46ch}
  .disc-section{padding:56px 0;border-top:1px solid var(--line)}
  .disc-head{display:flex;align-items:baseline;gap:20px;margin-bottom:34px}
  .disc-num{font-family:var(--ui);font-size:14px;font-weight:500;color:var(--muted-dark)}
  .disc-title{font-family:var(--display);font-weight:800;font-size:clamp(30px,4.6vw,54px);letter-spacing:-.02em;color:#fff;line-height:1}
  .disc-count{font-family:var(--ui);font-size:13px;color:var(--muted-dark);margin-left:auto}
  .disc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
  .disc-card{display:block;cursor:pointer}
  .disc-media{border-radius:16px;overflow:hidden;transition:box-shadow .35s ease}
  .disc-media img{width:100%;aspect-ratio:16/10;object-fit:cover;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .disc-card:hover .disc-media img{transform:scale(1.05)}
  .disc-card:hover .disc-media{box-shadow:0 0 0 2px var(--card-accent,#fff)}
  .disc-info{margin-top:16px;display:flex;flex-direction:column;gap:4px}
  .disc-name{font-family:var(--display);font-weight:700;font-size:22px;color:#fff}
  .disc-cat{font-family:var(--ui);font-size:13px;color:var(--muted)}
  .disc-soon{font-family:var(--body);font-size:16px;color:var(--muted-dark);padding:18px 0;font-style:italic}
  @media(max-width:720px){.disc-grid{grid-template-columns:1fr}}
  @media(max-width:820px){nav .navlinks{display:none}}
  footer{padding:70px 0 50px;text-align:center;color:var(--muted-dark);font-size:13px;font-family:var(--ui);letter-spacing:.04em;border-top:1px solid var(--line);margin-top:40px}
</style>
</head>
<body>
<nav>
  <a class="wordmark" href="/">Neel Parikh</a>
  <div class="navlinks">
    <a href="/work" class="active">Work</a>
    <a href="/about">About</a>
    <a href="mailto:neelparikh7@gmail.com">Contact</a>
  </div>
</nav>
<div class="work-intro">
  <div class="wrap">
    <p class="eyebrow">Selected Work</p>
    <h1>Things I've made.</h1>
    <p>Organised by discipline — product, brand, visual, and immersive. A few worth walking through.</p>
  </div>
</div>
<div class="wrap"><div id="workByDiscipline"></div></div>
<footer>Neel Parikh · Interaction &amp; immersive designer · Sydney</footer>
<script src="/assets/projects.js"></script>
<script>
  const wrap = document.getElementById('workByDiscipline');
  window.DISCIPLINES.forEach((disc, di) => {
    const inDisc = window.PROJECTS.filter(p => p.disciplines.includes(disc)).sort((a,b)=>a.order-b.order);
    const section = document.createElement('section');
    section.className = 'disc-section';
    const num = String(di+1).padStart(2,'0');
    const count = inDisc.length ? inDisc.length + (inDisc.length>1?' projects':' project') : '';
    section.innerHTML = `<div class="disc-head"><span class="disc-num">${num}</span><h2 class="disc-title">${disc}</h2><span class="disc-count">${count}</span></div>`;
    if (inDisc.length === 0){
      section.innerHTML += `<p class="disc-soon">New work landing here soon.</p>`;
    } else {
      const grid = document.createElement('div'); grid.className='disc-grid';
      inDisc.forEach(p=>{
        const a=document.createElement('a'); a.className='disc-card'; a.href=p.url;
        a.style.setProperty('--card-accent', p.accent);
        a.innerHTML = '<div class="disc-media"><img src="'+p.cover+'" alt="'+p.title+'" loading="lazy"></div><div class="disc-info"><span class="disc-name">'+p.title+'</span><span class="disc-cat">'+p.category+'</span></div>';
        grid.appendChild(a);
      });
      section.appendChild(grid);
    }
    wrap.appendChild(section);
  });
</script>
</body>
</html>
